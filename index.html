<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lane Clash Prototype - Vs AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        canvas {
            border: 4px solid #4b5563;
            background-color: #374151;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.5);
            cursor: crosshair;
            touch-action: none;
        }
        .card-button {
            transition: all 0.1s ease-in-out;
            width: 100%;
            position: relative;
        }
        .card-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }
        .card-button:active {
            transform: translateY(0);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        .card-active {
            border-bottom-color: #facc15 !important;
            box-shadow: 0 0 15px #facc15 !important;
        }
        .card-cooldown-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 0.75rem;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .deck-card {
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.3s;
        }
        .deck-card.selected {
            outline: 4px solid #facc15;
            outline-offset: 2px;
            box-shadow: 0 0 20px #facc15;
        }
        .deck-card:hover {
            transform: scale(1.05);
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .evo-glow {
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.8);
            border: 2px solid #10b981;
            animation: pulse-green 2s infinite;
        }
        .evo-glow.selected {
            outline: 4px solid #facc15;
            box-shadow: 0 0 10px #10b981, 0 0 20px #facc15;
            animation: none;
        }
        .stealth-effect {
            opacity: 0.4;
            filter: blur(2px);
        }
    </style>
</head>
<body class="p-4">
    <div id="game-container" class="flex flex-col items-center max-w-lg w-full">
        <div id="scoreboard" class="w-full text-center p-2 mb-4 rounded-lg bg-gray-900 shadow-xl">
            <div class="text-xs font-semibold text-gray-400 mb-1">Scoreboard</div>
            <div class="flex justify-center items-center space-x-4">
                <span class="text-2xl font-extrabold text-green-400" id="player-score">0</span>
                <span class="text-xl font-bold text-gray-400">vs</span>
                <span class="text-2xl font-extrabold text-red-400" id="ai-score">0</span>
            </div>
        </div>

        <div id="elixir-bar" class="w-full bg-gray-700 rounded-lg p-2 mb-4 flex items-center shadow-lg">
            <svg class="w-6 h-6 text-yellow-300 mr-2" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM7 9a1 1 0 011-1h4a1 1 0 110 2H8a1 1 0 01-1-1zm0 4a1 1 0 011-1h4a1 1 0 110 2H8a1 1 0 01-1-1z" clip-rule="evenodd"></path>
            </svg>
            <div class="text-white font-bold mr-4">Elixir:</div>
            <div class="flex-grow h-4 bg-gray-800 rounded-full overflow-hidden border border-yellow-500">
                <div id="elixir-fill" class="h-full bg-yellow-500 transition-all duration-100" style="width: 0%;"></div>
            </div>
            <span id="elixir-value" class="ml-2 font-bold text-yellow-300">0 / 10</span>
        </div>

        <canvas id="gameCanvas" width="380" height="600"></canvas>
        
        <div id="game-message-modal" class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-70 z-50">
             <div class="bg-gray-800 p-8 rounded-lg shadow-xl text-center border-t-8 border-yellow-500 max-w-md w-full">
                 <h2 id="modal-title" class="text-3xl font-bold text-white mb-4"></h2>
                 <p class="text-gray-400 mb-6 whitespace-pre-wrap text-left" id="modal-text"></p>
                 <button id="modal-restart-button" class="bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold py-2 px-4 rounded transition">
                     Start Next Game
                 </button>
             </div>
        </div>

        <div id="deck-selection-modal" class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-80 z-50 p-4">
            <div class="bg-gray-900 p-6 rounded-xl shadow-2xl max-w-xl w-full border-t-8 border-indigo-500">
                <h2 class="text-3xl font-extrabold text-white mb-2">Build Your Deck</h2>
                <p class="text-indigo-300 mb-4">Select exactly 4 unique cards to take into battle. You have <span id="deck-count" class="font-bold text-yellow-400">0</span>/4 selected.</p>
                <div id="deck-card-pool" class="grid grid-cols-3 sm:grid-cols-4 gap-3 max-h-80 overflow-y-auto pr-2"></div>
                <div class="mt-6 flex justify-between items-center">
                    <p id="deck-error" class="text-red-400 font-medium hidden">Please select exactly 4 cards.</p>
                    <button id="confirm-deck-button" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition disabled:opacity-50 disabled:cursor-not-allowed">
                        Confirm Deck (0/4)
                    </button>
                </div>
            </div>
        </div>
        
        <div id="card-container" class="w-full bg-gray-800 rounded-lg p-3 mt-4 grid grid-cols-3 gap-2 shadow-lg border border-gray-600"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game Constants
        const GAME_WIDTH = canvas.width;
        const GAME_HEIGHT = canvas.height;
        const ELIXIR_RATE = 0.8;
        const DEPLOYMENT_LINE_Y = 325;
        const WAYPOINT_TOLERANCE_SQ = 10 * 10;
        const PULL_RANGE = 70;
        const KING_TOWER_HP = 3000;
        const KING_TOWER_DAMAGE = 170;
        const KING_TOWER_HITSPEED = 1.0;
        const KING_TOWER_RANGE = 110;
        const PRINCESS_TOWER_HP = 1500;
        const PRINCESS_TOWER_DAMAGE = 170;
        const PRINCESS_TOWER_HITSPEED = 1.3;
        const PRINCESS_TOWER_RANGE = 120;
        const TOWER_RADIUS_P = 20;
        const TOWER_RADIUS_K = 30;
        const PLAYER_TOWER_COLOR = '#10b981';
        const ENEMY_TOWER_COLOR = '#dc2626';
        const FIRE_WIZARD_AOE_RADIUS = 35;

        // Game State
        let elixir = 0;
        let enemyElixir = 0;
        const MAX_ELIXIR = 10;
        let units = [];
        let buildings = [];
        let projectiles = [];
        let selectedCard = null;
        let lastTime = 0;
        let animationFrameId = null;
        let aiIntervalId = null;
        let playerScore = 0;
        let aiScore = 0;
        let isGameOver = false;
        const cardCooldowns = {};
        let playerDeck = [];
        let hasDeckSelectionUnlocked = true;

        // DOM Elements
        const elixirValueEl = document.getElementById('elixir-value');
        const elixirFillEl = document.getElementById('elixir-fill');
        const cardContainer = document.getElementById('card-container');
        const playerScoreEl = document.getElementById('player-score');
        const aiScoreEl = document.getElementById('ai-score');
        const messageModal = document.getElementById('game-message-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalText = document.getElementById('modal-text');
        const modalRestartButton = document.getElementById('modal-restart-button');
        const deckSelectionModal = document.getElementById('deck-selection-modal');
        const deckCardPool = document.getElementById('deck-card-pool');
        const confirmDeckButton = document.getElementById('confirm-deck-button');
        const deckCountEl = document.getElementById('deck-count');
        const deckErrorEl = document.getElementById('deck-error');

        // Waypoint Constants
        const BRIDGE_LEFT_X = 110;
        const BRIDGE_RIGHT_X = 270;
        const BRIDGE_ENTRANCE_Y = 330;
        const BRIDGE_EXIT_Y = 270;

        // Unit Definitions
        const ALL_CARD_STATS = [
            { name: 'Footman', cost: 3, maxHp: 700, damage: 150, hitspeed: 1.2, speed: 50, radius: 12, color: '#60a5fa', attackRange: 5, emoji: '🛡️', id: 'footman', targetPreference: 'all', cooldown: 2000, spawnCount: 1, isAOE: false },
            { name: 'Spearman', cost: 2, maxHp: 450, damage: 90, hitspeed: 1.0, speed: 55, radius: 10, color: '#14b8a6', attackRange: 5, emoji: '🔱', id: 'spearman', targetPreference: 'all', cooldown: 2000, spawnCount: 1, isAOE: false },
            { name: 'Knight', cost: 3, maxHp: 600, damage: 120, hitspeed: 1.1, speed: 40, radius: 12, color: '#9333ea', attackRange: 5, emoji: '⚔️', id: 'knight', targetPreference: 'all', cooldown: 2000, spawnCount: 1, isAOE: false },
            { name: 'Berserker', cost: 4, maxHp: 500, damage: 150, hitspeed: 0.8, speed: 50, radius: 12, color: '#f97316', attackRange: 5, emoji: '🪓', id: 'berserker', targetPreference: 'all', cooldown: 2000, spawnCount: 1, isAOE: false },
            { name: 'War Golem', cost: 7, maxHp: 2200, damage: 300, hitspeed: 2.0, speed: 20, radius: 20, color: '#78716c', attackRange: 5, emoji: '🪨', id: 'golem', targetPreference: 'buildings', cooldown: 2000, spawnCount: 1, isAOE: false },
            { name: 'Fire Wizard', cost: 3, maxHp: 400, damage: 250, hitspeed: 2.0, speed: 45, radius: 10, color: '#f59e0b', attackRange: 100, emoji: '🔥', id: 'wizard', targetPreference: 'all', cooldown: 2000, spawnCount: 1, isAOE: true, aoeRadius: FIRE_WIZARD_AOE_RADIUS },
            { name: 'Skeletons', cost: 1, maxHp: 120, damage: 55, hitspeed: 1.0, speed: 60, radius: 8, color: '#f3f4f6', attackRange: 5, emoji: '💀', id: 'skeleton', targetPreference: 'all', cooldown: 2000, spawnCount: 3, isAOE: false },
            { name: 'Ancient Skeleton', cost: 3, maxHp: 650, damage: 180, hitspeed: 1.1, speed: 40, radius: 15, color: '#4b5563', attackRange: 5, emoji: '🛡️💀', id: 'ancient-skeleton', targetPreference: 'all', cooldown: 2000, spawnCount: 1, isAncient: true, isAOE: false },
            { name: 'Ancient Fire Wizard', cost: 4, maxHp: 500, damage: 200, hitspeed: 1.8, speed: 45, radius: 10, color: '#ef4444', attackRange: 125, emoji: '🔥🛡️', id: 'ancient-fire-wizard', targetPreference: 'all', cooldown: 2000, spawnCount: 1, isAOE: true, aoeRadius: 40, isAncient: true, hasShield: true, initialShieldHP: 150, shieldDurationMS: 3000 },
            { name: 'Royal Recruits', cost: 7, maxHp: 1350, damage: 180, hitspeed: 1.2, speed: 50, radius: 12, color: '#c084fc', attackRange: 25, emoji: '🛡️🪖', id: 'royal-recruits', targetPreference: 'all', cooldown: 2000, spawnCount: 8, isAOE: false },
            { name: 'Shadow Assassin', cost: 4, maxHp: 350, damage: 300, hitspeed: 0.9, speed: 80, radius: 10, color: '#1f2937', attackRange: 10, emoji: '🗡️🌑', id: 'shadow-assassin', targetPreference: 'all', cooldown: 2000, spawnCount: 1, isAOE: false, stealth: true, stealthDurationMS: 2000 },
            { name: 'Luminous Sprite', cost: 3, maxHp: 300, damage: 120, hitspeed: 0.8, speed: 75, radius: 10, color: '#fcd34d', attackRange: 90, emoji: '✨🧚', id: 'luminous-sprite', targetPreference: 'all', cooldown: 2000, spawnCount: 1, isAOE: true, aoeRadius: 20, healAllies: true, healAmount: 50 },
            { name: 'Ancient Luminous Sprite', cost: 5, maxHp: 450, damage: 160, hitspeed: 0.7, speed: 80, radius: 12, color: '#fbbf24', attackRange: 100, emoji: '✨👑🧚', id: 'ancient-luminous-sprite', targetPreference: 'all', cooldown: 2000, spawnCount: 1, isAOE: true, aoeRadius: 25, healAllies: true, healAmount: 70, isAncient: true, hasShield: true, initialShieldHP: 100, shieldDurationMS: 4000, canResurrect: true, resurrectionRange: 100, resurrectionHP: 0.3 },
            { name: 'Iron Fang Wolf', cost: 5, maxHp: 900, damage: 180, hitspeed: 1.1, speed: 60, radius: 12, color: '#dc2626', attackRange: 15, emoji: '🐺⚔️', id: 'iron-fang-wolf', targetPreference: 'all', cooldown: 2000, spawnCount: 1, isAOE: false, biteBoost: true, maxBoost: 2 },
            { name: 'Obsidian Sentinel', cost: 5, maxHp: 2000, damage: 220, hitspeed: 1.5, speed: 35, radius: 20, color: '#171717', attackRange: 30, emoji: '🗿🔥', id: 'obsidian-sentinel', targetPreference: 'all', cooldown: 2000, spawnCount: 1, isAOE: false, hasShield: true, initialShieldHP: 300, shieldDurationMS: 5000 }
        ];

        // Utility Functions
        function getEnemyKingTower() {
            return buildings.find(b => b.team === 'enemy' && b.isKing);
        }
        function getPlayerKingTower() {
            return buildings.find(b => b.team === 'player' && b.isKing);
        }
        function getEnemyPrincessTowers() {
            return {
                left: buildings.find(b => b.team === 'enemy' && !b.isKing && b.x === BRIDGE_LEFT_X),
                right: buildings.find(b => b.team === 'enemy' && !b.isKing && b.x === BRIDGE_RIGHT_X)
            };
        }
        function getPlayerPrincessTowers() {
            return {
                left: buildings.find(b => b.team === 'player' && !b.isKing && b.x === BRIDGE_LEFT_X),
                right: buildings.find(b => b.team === 'player' && !b.isKing && b.x === BRIDGE_RIGHT_X)
            };
        }

        // Unit Class with All Mechanics
        class Unit {
            constructor(x, y, stats, team, path, targetBuilding) {
                this.x = x;
                this.y = y;
                this.stats = stats;
                this.hp = stats.maxHp;
                this.maxHp = stats.maxHp;
                this.team = team;
                this.isAttacking = false;
                this.finalTarget = targetBuilding;
                this.path = path;
                this.currentWaypointIndex = 0;
                this.attackCooldown = 0;
                this.hitspeedMS = stats.hitspeed * 1000;
                this.hasCrossedBridge = false;
                this.targetLock = null;
                this.attackCounter = 0;
                this.isStunned = false;
                this.stealthTimer = 0;
                this.isStealthed = false;
                this.biteBoostStacks = 0;
                this.healCooldown = 0;
                
                // Shield Logic
                this.shieldHP = 0;
                this.shieldTimer = 0;
                if (this.stats.hasShield) {
                    this.shieldHP = this.stats.initialShieldHP;
                    this.shieldTimer = this.stats.shieldDurationMS;
                }
                
                // Stealth activation
                if (this.stats.stealth) {
                    this.isStealthed = true;
                    this.stealthTimer = this.stats.stealthDurationMS;
                }
            }
            
            performAncientShockwave() {
                const AOE_DAMAGE = 90;
                const AOE_RADIUS = 60;
                const AOE_RADIUS_SQ = AOE_RADIUS * AOE_RADIUS;
                const STUN_DURATION = 500;

                for (const otherUnit of units) {
                    if (otherUnit.team !== this.team && otherUnit.hp > 0) {
                        const dx = otherUnit.x - this.x;
                        const dy = otherUnit.y - this.y;
                        const distanceSq = dx * dx + dy * dy;
                        if (distanceSq <= AOE_RADIUS_SQ) {
                            otherUnit.takeDamage(AOE_DAMAGE);
                            otherUnit.isStunned = true;
                            setTimeout(() => { otherUnit.isStunned = false; }, STUN_DURATION);
                        }
                    }
                }
                
                projectiles.push({
                    start: { x: this.x, y: this.y },
                    end: { x: this.x, y: this.y },
                    color: '#facc15',
                    ttl: 200,
                    isAOE: true,
                    radius: AOE_RADIUS,
                    isImpact: true
                });
            }
            
            performAttack(target) {
                if (!target || target.isDestroyed || target.hp <= 0) {
                    this.targetLock = null;
                    return;
                }
                
                let damage = this.stats.damage;
                
                // Iron Fang Wolf bite boost
                if (this.stats.biteBoost && this.biteBoostStacks > 0) {
                    damage *= (1 + this.biteBoostStacks * 0.5);
                }
                
                target.takeDamage(damage);
                
                // Bite boost stack gain on hit
                if (this.stats.biteBoost && this.biteBoostStacks < this.stats.maxBoost) {
                    this.biteBoostStacks++;
                }
                
                // AOE Logic
                if (this.stats.isAOE) {
                    const radius = this.stats.aoeRadius || 30;
                    const radiusSq = radius * radius;
                    const targetTeam = target instanceof Unit ? target.team : (this.team === 'player' ? 'enemy' : 'player');
                    
                    for (const otherUnit of units) {
                        if (otherUnit.team === targetTeam && otherUnit !== target && otherUnit.hp > 0) {
                            const dx = otherUnit.x - target.x;
                            const dy = otherUnit.y - target.y;
                            const distanceSq = dx * dx + dy * dy;
                            if (distanceSq <= radiusSq) {
                                otherUnit.takeDamage(this.stats.damage * 0.5);
                            }
                        }
                    }
                    
                    projectiles.push({
                        start: { x: target.x, y: target.y },
                        end: { x: target.x, y: target.y },
                        color: this.stats.color,
                        ttl: 200,
                        isAOE: true,
                        radius: radius,
                        isImpact: true
                    });
                }
                
                // Ancient Skeleton Special Attack
                if (this.stats.id === 'ancient-skeleton') {
                    this.attackCounter++;
                    if (this.attackCounter % 3 === 0) {
                        this.performAncientShockwave();
                    }
                }
                
                // Luminous Sprite Healing
                if (this.stats.healAllies && this.healCooldown <= 0) {
                    for (const ally of units) {
                        if (ally.team === this.team && ally !== this && ally.hp > 0 && ally.hp < ally.maxHp) {
                            const dx = ally.x - this.x;
                            const dy = ally.y - this.y;
                            const distanceSq = dx * dx + dy * dy;
                            if (distanceSq <= 2500) { // 50 range squared
                                ally.hp = Math.min(ally.maxHp, ally.hp + this.stats.healAmount);
                                // Visual heal effect
                                projectiles.push({
                                    start: { x: ally.x, y: ally.y },
                                    end: { x: ally.x, y: ally.y },
                                    color: '#10b981',
                                    ttl: 300,
                                    isAOE: true,
                                    radius: 15,
                                    isImpact: true
                                });
                            }
                        }
                    }
                    this.healCooldown = 1000; // 1 second between heals
                }
            }

            draw() {
                ctx.save();
                
                // Stealth effect
                if (this.isStealthed) {
                    ctx.globalAlpha = 0.4;
                }
                
                // Unit Body
                ctx.fillStyle = this.stats.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.stats.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // Reset alpha for other elements
                if (this.isStealthed) {
                    ctx.globalAlpha = 1.0;
                }
                
                // Shield Visual
                if (this.shieldHP > 0) {
                    ctx.strokeStyle = '#60a5fa';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.stats.radius + 4, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // Emoji
                ctx.font = '16px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = this.isStealthed ? 'rgba(255,255,255,0.6)' : 'white';
                ctx.fillText(this.stats.emoji, this.x, this.y - 2);
                
                // Bite boost indicator (Iron Fang Wolf)
                if (this.stats.biteBoost && this.biteBoostStacks > 0) {
                    ctx.fillStyle = '#dc2626';
                    ctx.font = '10px sans-serif';
                    ctx.fillText('+' + this.biteBoostStacks, this.x + 10, this.y - 10);
                }
                
                ctx.restore();
                
                // Health Bar
                const totalBarWidth = 30;
                const barY = this.y - this.stats.radius - 10;
                ctx.fillStyle = 'black';
                ctx.fillRect(this.x - 15, barY, totalBarWidth, 5);
                
                const hpPercent = this.hp / this.stats.maxHp;
                const hpWidth = totalBarWidth * hpPercent;
                ctx.fillStyle = hpPercent > 0.3 ? '#22c55e' : '#ef4444';
                ctx.fillRect(this.x - 15, barY, hpWidth, 5);

                // Shield Bar
                if (this.shieldHP > 0 && this.stats.initialShieldHP) {
                    const totalEffectiveHP = this.stats.maxHp + this.stats.initialShieldHP;
                    const hpSegmentWidth = totalBarWidth * (this.hp / totalEffectiveHP);
                    const shieldSegmentWidth = totalBarWidth * (this.shieldHP / totalEffectiveHP);
                    const shieldStartX = this.x - 15 + hpSegmentWidth;
                    ctx.fillStyle = '#60a5fa';
                    ctx.fillRect(shieldStartX, barY, shieldSegmentWidth, 5);
                }
            }
            
            takeDamage(damage) {
                if (this.hp <= 0) return;

                let remainingDamage = damage;
                
                // Shield absorbs damage
                if (this.shieldHP > 0) {
                    if (remainingDamage >= this.shieldHP) {
                        remainingDamage -= this.shieldHP;
                        this.shieldHP = 0;
                    } else {
                        this.shieldHP -= remainingDamage;
                        remainingDamage = 0;
                    }
                }

                this.hp -= remainingDamage;
                if (this.hp < 0) this.hp = 0;
                
                // Break stealth on damage
                if (this.isStealthed && damage > 0) {
                    this.isStealthed = false;
                }
            }

            getCurrentTarget() {
                if (this.currentWaypointIndex < this.path.length) {
                    return this.path[this.currentWaypointIndex];
                }
                return this.finalTarget;
            }
            
            findClosestEnemyUnit() {
                let closestUnit = null;
                let minDistanceSq = Infinity;
                const maxPullSq = PULL_RANGE * PULL_RANGE;

                for (const otherUnit of units) {
                    if (otherUnit.team !== this.team && otherUnit.hp > 0) {
                        const dx = otherUnit.x - this.x;
                        const dy = otherUnit.y - this.y;
                        const distanceSq = dx * dx + dy * dy;
                        if (distanceSq > maxPullSq) continue;
                        if (distanceSq < minDistanceSq) {
                            minDistanceSq = distanceSq;
                            closestUnit = otherUnit;
                        }
                    }
                }
                return closestUnit;
            }

            update(deltaTime) {
                const dt = deltaTime / 1000;
                
                if (this.hp <= 0) return;
                
                // Update cooldowns
                if (this.attackCooldown > 0) this.attackCooldown -= deltaTime;
                if (this.healCooldown > 0) this.healCooldown -= deltaTime;

                // Update stealth
                if (this.isStealthed && this.stealthTimer > 0) {
                    this.stealthTimer -= deltaTime;
                    if (this.stealthTimer <= 0) this.isStealthed = false;
                }
                
                // Update shield timer
                if (this.shieldHP > 0 && this.stats.hasShield) {
                    this.shieldTimer -= deltaTime;
                    if (this.shieldTimer <= 0) this.shieldHP = 0;
                }
                
                // Bridge crossing check
                if (this.team === 'player' && this.y <= BRIDGE_EXIT_Y) this.hasCrossedBridge = true;
                else if (this.team === 'enemy' && this.y >= BRIDGE_ENTRANCE_Y) this.hasCrossedBridge = true;
                
                // Handle destroyed target
                if (this.finalTarget.isDestroyed) {
                    const kingTower = this.team === 'player' ? getEnemyKingTower() : getPlayerKingTower();
                    if (kingTower && !kingTower.isDestroyed) {
                        this.finalTarget = kingTower;
                        this.path = [];
                        this.currentWaypointIndex = 0;
                    } else {
                        return;
                    }
                }

                if (this.targetLock && (this.targetLock.isDestroyed || this.targetLock.hp <= 0)) {
                    this.targetLock = null;
                }

                // Determine target
                let movementTarget = this.getCurrentTarget();
                let attackTarget = null;
                
                if (this.targetLock) {
                    attackTarget = this.targetLock;
                    movementTarget = this.targetLock;
                } else {
                    let closestUnit = null;
                    if (this.stats.targetPreference !== 'buildings') {
                        closestUnit = this.findClosestEnemyUnit();
                    }
                    
                    if (closestUnit) {
                        attackTarget = closestUnit;
                        movementTarget = closestUnit;

                        if (!this.hasCrossedBridge) {
                            let targetIsAcrossRiver = false;
                            if (this.team === 'player' && closestUnit.y <= BRIDGE_EXIT_Y) targetIsAcrossRiver = true;
                            else if (this.team === 'enemy' && closestUnit.y >= BRIDGE_ENTRANCE_Y) targetIsAcrossRiver = true;
                            
                            if (targetIsAcrossRiver) {
                                movementTarget = this.getCurrentTarget();
                                attackTarget = null;
                            }
                        }
                    } else {
                        attackTarget = this.finalTarget;
                        movementTarget = this.getCurrentTarget();
                    }
                }
                
                const target = movementTarget;
                if (!target) return;

                const dx = target.x - this.x;
                const dy = target.y - this.y;
                const minDistanceSq = dx * dx + dy * dy;
                const distance = Math.sqrt(minDistanceSq);
                
                let effectiveAttackRange = 0;
                let targetIsAttackable = false;

                if (target instanceof Unit) {
                    effectiveAttackRange = this.stats.attackRange + target.stats.radius + this.stats.radius;
                    targetIsAttackable = (attackTarget === target);
                } else if (target instanceof Building) {
                    effectiveAttackRange = this.stats.attackRange + target.radius + this.stats.radius;
                    targetIsAttackable = (attackTarget === target);
                }

                // Attack
                if (targetIsAttackable && distance <= effectiveAttackRange) {
                    this.targetLock = attackTarget;
                    this.isAttacking = true;
                    if (this.attackCooldown <= 0) {
                        this.performAttack(attackTarget);
                        this.attackCooldown = this.hitspeedMS;
                        if (this.stats.attackRange > 5) {
                            this.drawProjectile(attackTarget);
                        }
                    }
                    return;
                }
                
                // Movement
                if (this.isStunned) {
                    this.isAttacking = false;
                    return;
                }

                if (this.currentWaypointIndex < this.path.length && target === this.path[this.currentWaypointIndex]) {
                    if (minDistanceSq < WAYPOINT_TOLERANCE_SQ) {
                        this.currentWaypointIndex++;
                        this.isAttacking = false;
                        return;
                    }
                }
                
                this.isAttacking = false;
                if (distance > 0) {
                    const directionX = dx / distance;
                    const directionY = dy / distance;
                    this.x += directionX * this.stats.speed * dt;
                    this.y += directionY * this.stats.speed * dt;
                }
            }
            
            drawProjectile(target) {
                projectiles.push({
                    start: { x: this.x, y: this.y },
                    end: { x: target.x, y: target.y },
                    target: target,
                    color: this.stats.color,
                    speed: 500,
                    life: 0,
                    damage: this.stats.damage,
                    isAOE: this.stats.isAOE,
                    aoeRadius: this.stats.aoeRadius,
                    isImpact: false
                });
            }
        }
        
        // Building Class
        class Building {
            constructor(x, y, team, isKing=false) {
                this.x = x;
                this.y = y;
                this.team = team;
                this.isKing = isKing;
                this.radius = isKing ? TOWER_RADIUS_K : TOWER_RADIUS_P;
                this.maxHp = isKing ? KING_TOWER_HP : PRINCESS_TOWER_HP;
                this.hp = this.maxHp;
                this.damage = isKing ? KING_TOWER_DAMAGE : PRINCESS_TOWER_DAMAGE;
                this.hitspeed = isKing ? KING_TOWER_HITSPEED : PRINCESS_TOWER_HITSPEED;
                this.range = isKing ? KING_TOWER_RANGE : PRINCESS_TOWER_RANGE;
                this.hitspeedMS = this.hitspeed * 1000;
                this.attackCooldown = 0;
                this.targetLock = null;
                this.isDestroyed = false;
                this.emoji = isKing ? '👑' : '🛡️';
                this.color = team === 'player' ? PLAYER_TOWER_COLOR : ENEMY_TOWER_COLOR;
                this.isActivated = !isKing;
            }

            takeDamage(damage) {
                this.hp -= damage;
                if (this.hp <= 0) {
                    this.hp = 0;
                    this.isDestroyed = true;
                    if (this.isKing) {
                        gameOver(this.team === 'player' ? 'DEFEAT!' : 'VICTORY!');
                    } else {
                        const kingTower = this.team === 'player' ? getPlayerKingTower() : getEnemyKingTower();
                        if (kingTower) kingTower.isActivated = true;
                    }
                }
            }
            
            findTarget() {
                let closestUnit = null;
                let minDistanceSq = Infinity;
                const rangeSq = this.range * this.range;
                const targetTeam = this.team === 'player' ? 'enemy' : 'player';

                for (const unit of units) {
                    if (unit.team === targetTeam && unit.hp > 0) {
                        const dx = unit.x - this.x;
                        const dy = unit.y - this.y;
                        const distanceSq = dx * dx + dy * dy;
                        if (distanceSq <= rangeSq && distanceSq < minDistanceSq) {
                            minDistanceSq = distanceSq;
                            closestUnit = unit;
                        }
                    }
                }
                return closestUnit;
            }

            update(deltaTime) {
                if (this.isDestroyed || !this.isActivated) return;
                if (this.attackCooldown > 0) {
                    this.attackCooldown -= deltaTime;
                    return;
                }

                if (this.targetLock && (this.targetLock.hp <= 0 || this.targetLock.isDestroyed)) {
                    this.targetLock = null;
                }

                if (!this.targetLock) {
                    this.targetLock = this.findTarget();
                }

                if (this.targetLock) {
                    const target = this.targetLock;
                    const dx = target.x - this.x;
                    const dy = target.y - this.y;
                    const distanceSq = dx * dx + dy * dy;
                    const effectiveRangeSq = (this.range + this.radius + target.stats.radius) ** 2;

                    if (distanceSq <= effectiveRangeSq) {
                        target.takeDamage(this.damage);
                        this.attackCooldown = this.hitspeedMS;
                        this.drawProjectile(target);
                    } else {
                        this.targetLock = null;
                    }
                }
            }

            drawProjectile(target) {
                projectiles.push({
                    start: { x: this.x, y: this.y },
                    end: { x: target.x, y: target.y },
                    target: target,
                    color: this.color,
                    speed: 600,
                    life: 0,
                    damage: this.damage,
                    isAOE: false,
                    isImpact: false,
                    isTowerShot: true
                });
            }
            
            draw() {
                if (this.isDestroyed) {
                    ctx.fillStyle = '#4b5563';
                    ctx.fillRect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
                    ctx.font = '20px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#1f2937';
                    ctx.fillText('💥', this.x, this.y);
                    return;
                }

                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                if (!this.isActivated) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                    ctx.fillRect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
                }

                ctx.font = this.isKing ? '24px sans-serif' : '18px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = 'white';
                ctx.fillText(this.emoji, this.x, this.y - 2);

                const totalBarWidth = 40;
                const barY = this.y - this.radius - 10;
                ctx.fillStyle = 'black';
                ctx.fillRect(this.x - totalBarWidth / 2, barY, totalBarWidth, 5);
                
                const hpPercent = this.hp / this.maxHp;
                const hpWidth = totalBarWidth * hpPercent;
                ctx.fillStyle = hpPercent > 0.3 ? '#22c55e' : '#ef4444';
                ctx.fillRect(this.x - totalBarWidth / 2, barY, hpWidth, 5);
            }
        }

        // Game Functions
        function initTowers() {
            buildings = [];
            buildings.push(new Building(GAME_WIDTH / 2, GAME_HEIGHT - 40, 'player', true));
            buildings.push(new Building(BRIDGE_LEFT_X, GAME_HEIGHT - 130, 'player'));
            buildings.push(new Building(BRIDGE_RIGHT_X, GAME_HEIGHT - 130, 'player'));
            buildings.push(new Building(GAME_WIDTH / 2, 40, 'enemy', true));
            buildings.push(new Building(BRIDGE_LEFT_X, 130, 'enemy'));
            buildings.push(new Building(BRIDGE_RIGHT_X, 130, 'enemy'));
        }

        function spawnUnit(card, x, y, team) {
            const targetTowers = team === 'player' ? getEnemyPrincessTowers() : getPlayerPrincessTowers();
            let targetTower = null;
            let path = [];

            if (x < GAME_WIDTH / 2) {
                targetTower = targetTowers.left;
                path = team === 'player' ? [
                    { x: BRIDGE_LEFT_X, y: BRIDGE_ENTRANCE_Y },
                    { x: BRIDGE_LEFT_X, y: BRIDGE_EXIT_Y }
                ] : [
                    { x: BRIDGE_LEFT_X, y: GAME_HEIGHT - BRIDGE_ENTRANCE_Y },
                    { x: BRIDGE_LEFT_X, y: GAME_HEIGHT - BRIDGE_EXIT_Y }
                ];
            } else {
                targetTower = targetTowers.right;
                path = team === 'player' ? [
                    { x: BRIDGE_RIGHT_X, y: BRIDGE_ENTRANCE_Y },
                    { x: BRIDGE_RIGHT_X, y: BRIDGE_EXIT_Y }
                ] : [
                    { x: BRIDGE_RIGHT_X, y: GAME_HEIGHT - BRIDGE_ENTRANCE_Y },
                    { x: BRIDGE_RIGHT_X, y: GAME_HEIGHT - BRIDGE_EXIT_Y }
                ];
            }
            
            if (targetTower && !targetTower.isDestroyed) {
                for (let i = 0; i < card.spawnCount; i++) {
                    const spawnX = x + (Math.random() * 10 - 5);
                    const spawnY = y + (Math.random() * 10 - 5);
                    units.push(new Unit(spawnX, spawnY, card, team, path, targetTower));
                }
            } else {
                const altTower = x < GAME_WIDTH / 2 ? targetTowers.right : targetTowers.left;
                const kingTower = team === 'player' ? getEnemyKingTower() : getPlayerKingTower();

                if (altTower && !altTower.isDestroyed) {
                    const newPath = team === 'player' ? [
                        { x: GAME_WIDTH / 2, y: DEPLOYMENT_LINE_Y - 50 },
                        { x: altTower.x, y: altTower.y + altTower.radius + 50 }
                    ] : [
                        { x: GAME_WIDTH / 2, y: 50 },
                        { x: altTower.x, y: altTower.y - altTower.radius - 50 }
                    ];
                    
                    for (let i = 0; i < card.spawnCount; i++) {
                        const spawnX = x + (Math.random() * 10 - 5);
                        const spawnY = y + (Math.random() * 10 - 5);
                        units.push(new Unit(spawnX, spawnY, card, team, newPath, altTower));
                    }
                } else if (kingTower && !kingTower.isDestroyed) {
                    for (let i = 0; i < card.spawnCount; i++) {
                        const spawnX = x + (Math.random() * 10 - 5);
                        const spawnY = y + (Math.random() * 10 - 5);
                        units.push(new Unit(spawnX, spawnY, card, team, [], kingTower));
                    }
                }
            }
        }
        
        function handleCanvasClick(event) {
            if (!selectedCard || isGameOver) return;

            const rect = canvas.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const clickY = event.clientY - rect.top;

            if (clickY >= DEPLOYMENT_LINE_Y) {
                if (elixir >= selectedCard.cost) {
                    if (cardCooldowns[selectedCard.id] > 0) return;
                    
                    elixir -= selectedCard.cost;
                    cardCooldowns[selectedCard.id] = selectedCard.cooldown;
                    spawnUnit(selectedCard, clickX, clickY, 'player');
                    updateCardUI();
                    
                    selectedCard = null;
                    document.querySelector('.card-active')?.classList.remove('card-active');
                }
            }
        }
        
        function selectCard(cardData, cardButton) {
            if (cardButton.classList.contains('cooldown') || elixir < cardData.cost) return;

            document.querySelector('.card-active')?.classList.remove('card-active');

            if (selectedCard === cardData) {
                selectedCard = null;
            } else {
                selectedCard = cardData;
                cardButton.classList.add('card-active');
            }
        }

                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM7 9a1 1 0 011-1h4a1 1 0 110 2H8a1 1 0 01-1-1zm0 4a1 1 0 011-1h4a1 1 0 110 2H8a1 1 0 01-1-1z" clip-rule="evenodd"></path>
                        </svg>
                        ${cardData.cost}
                    </span>
                </div>
                <span class="text-4xl leading-none">${cardData.emoji}</span>

        function populateGameCards() {
            cardContainer.innerHTML = '';
            playerDeck.forEach(cardData => {
                const cardElement = createCardElement(cardData);
                cardContainer.appendChild(cardElement);
            });
            updateCardUI();
        }
        
        function updateCardUI() {
            const cardButtons = cardContainer.querySelectorAll('.card-button');
            cardButtons.forEach(button => {
                const cardId = button.getAttribute('data-card-id');
                const cooldownOverlay = button.querySelector('.card-cooldown-overlay');
                const cost = parseInt(button.getAttribute('data-cost'), 10);
                
                if (cardCooldowns[cardId] > 0) {
                    button.classList.add('cooldown');
                    cooldownOverlay.classList.remove('hidden');
                    const seconds = Math.ceil(cardCooldowns[cardId] / 1000);
                    cooldownOverlay.textContent = seconds;
                } else {
                    button.classList.remove('cooldown');
                    cooldownOverlay.classList.add('hidden');
                }

                if (elixir < cost || cardCooldowns[cardId] > 0) {
                    button.style.opacity = '0.5';
                    button.style.cursor = 'not-allowed';
                } else {
                    button.style.opacity = '1';
                    button.style.cursor = 'pointer';
                }
            });
        }
        
        function populateDeckSelectionModal() {
            deckCardPool.innerHTML = '';
            
            ALL_CARD_STATS.forEach(cardData => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'deck-card bg-gray-800 p-2 rounded-xl text-white text-center shadow-lg border-b-4 border-gray-700';

                }

                cardDiv.setAttribute('data-card-id', cardData.id);

                cardDiv.innerHTML = `
                    <div class="text-xs font-bold text-yellow-500">${cardData.cost} Elixir</div>
                    <span class="text-3xl leading-none">${cardData.emoji}</span>

                cardDiv.addEventListener('click', () => toggleCardSelection(cardData, cardDiv));
                
                if (playerDeck.some(c => c.id === cardData.id)) {

        function toggleCardSelection(cardData, cardElement) {
            const cardIndex = playerDeck.findIndex(c => c.id === cardData.id);

            if (cardIndex > -1) {
                playerDeck.splice(cardIndex, 1);
                cardElement.classList.remove('selected');
            } else {
                if (playerDeck.length < 4) {
                    playerDeck.push(cardData);

                } else {
                    deckErrorEl.textContent = 'Deck is full! (Max 4 cards)';

            updateDeckSelectionUI();

            confirmDeckButton.textContent = `Confirm Deck (${playerDeck.length}/4)`;
            
            if (playerDeck.length === 4) {

        function startGame() {
            isGameOver = false;
            units = [];
            buildings = [];
            projectiles = [];
            elixir = 3; // Start with some elixir
            enemyElixir = 3;
            
            // Reset cooldowns
            Object.keys(cardCooldowns).forEach(key => delete cardCooldowns[key]);
            playerDeck.forEach(card => cardCooldowns[card.id] = 0);

            initTowers();
            updateScoreboard();
            
            lastTime = performance.now();
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            if (aiIntervalId) clearInterval(aiIntervalId);
            
            animationFrameId = requestAnimationFrame(gameLoop);
            aiIntervalId = setInterval(aiTurn, 3000);
        }
        
        function restartGame() {
            messageModal.classList.add('hidden');
            playerDeck = [];
            showDeckSelection();
        }

        function showDeckSelection() {
            deckSelectionModal.style.display = 'flex';
            populateDeckSelectionModal();
        }

        modalRestartButton.addEventListener('click', restartGame);
        canvas.addEventListener('click', handleCanvasClick);
        
        // Touch support for mobile
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const mouseEvent = new MouseEvent('click', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });

        function updateScoreboard() {
            playerScoreEl.textContent = playerScore;
            aiScoreEl.textContent = aiScore;
        }

        function gameLoop(currentTime) {
            if (isGameOver) return;

            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            
            // Clear canvas
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            
            // Draw map
            drawMap();
            
            // Update elixir (FIXED: proper delta time)
            const dt = deltaTime / 1000;
            if (elixir < MAX_ELIXIR) {
                elixir = Math.min(MAX_ELIXIR, elixir + ELIXIR_RATE * dt);
            }
            if (enemyElixir < MAX_ELIXIR) {
                enemyElixir = Math.min(MAX_ELIXIR, enemyElixir + ELIXIR_RATE * dt);
            }
            
            // Update cooldowns
            for (const id in cardCooldowns) {
                if (cardCooldowns[id] > 0) {
                    cardCooldowns[id] -= deltaTime;
                    if (cardCooldowns[id] < 0) cardCooldowns[id] = 0;
                }
            }
            
            // Update elixir UI
            elixirValueEl.textContent = `${Math.floor(elixir)} / ${MAX_ELIXIR}`;
            elixirFillEl.style.width = `${(elixir / MAX_ELIXIR) * 100}%`;
            updateCardUI();

            // Update and draw projectiles
            updateProjectiles(deltaTime);

            // Update units
            units.forEach(unit => unit.update(deltaTime));
            units = units.filter(unit => unit.hp > 0);

            // Update buildings
            buildings.forEach(building => building.update(deltaTime));

            // Draw everything (proper z-order)
            buildings.forEach(building => building.draw());
            units.forEach(unit => unit.draw());

            animationFrameId = requestAnimationFrame(gameLoop);
        }
        
        function drawMap() {
            // River
            ctx.fillStyle = '#60a5fa';
            ctx.fillRect(0, 270, GAME_WIDTH, 60);
            
            // Bridges
            ctx.fillStyle = '#57534e';
            ctx.fillRect(BRIDGE_LEFT_X - 10, 270, 20, 60);
            ctx.fillRect(BRIDGE_RIGHT_X - 10, 270, 20, 60);
            
            // Deployment line
            ctx.strokeStyle = '#facc15';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(0, DEPLOYMENT_LINE_Y);
            ctx.lineTo(GAME_WIDTH, DEPLOYMENT_LINE_Y);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        function updateProjectiles(deltaTime) {
            const dt = deltaTime / 1000;
            
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                
                if (p.isImpact) {
                    // Impact effect
                    p.ttl -= deltaTime;
                    if (p.ttl <= 0) {
                        projectiles.splice(i, 1);
                        continue;
                    }
                    
                    ctx.save();
                    ctx.strokeStyle = p.color;
                    ctx.lineWidth = 3;
                    ctx.globalAlpha = p.ttl / 200;
                    ctx.beginPath();
                    ctx.arc(p.start.x, p.start.y, p.radius * (1.5 - p.ttl / 400), 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                } else {
                    // Moving projectile
                    const dx = p.end.x - p.start.x;
                    const dy = p.end.y - p.start.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    p.life += p.speed * dt;
                    const t = Math.min(1, p.life / dist);
                    
                    const currentX = p.start.x + dx * t;
                    const currentY = p.start.y + dy * t;
                    
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(currentX, currentY, 4, 0, Math.PI * 2);
                    ctx.fill();
                    
                    if (t >= 1) {
                        projectiles.splice(i, 1);
                    }
                }
            }
        }

        function aiTurn() {
            if (isGameOver || enemyElixir < 2) return;
            
            // AI uses random cards from ALL cards (not just its own deck)
            const availableCards = ALL_CARD_STATS.filter(card => card.cost <= enemyElixir);
            if (availableCards.length === 0) return;
            
            const cardToSpawn = availableCards[Math.floor(Math.random() * availableCards.length)];
            enemyElixir -= cardToSpawn.cost;

            // Deploy in enemy zone (top)
            const deployX = Math.random() < 0.5 ? BRIDGE_LEFT_X : BRIDGE_RIGHT_X;
            const deployY = 100 + Math.random() * 50; // Proper enemy deployment zone

            spawnUnit(cardToSpawn, deployX, deployY, 'enemy');
        }

        function gameOver(message) {
            isGameOver = true;
            modalTitle.textContent = message;
            
            if (message === 'VICTORY!') {
                playerScore++;
                modalText.textContent = "Congratulations! You destroyed the enemy King Tower!";
            } else {
                aiScore++;
                modalText.textContent = "Defeat! Your King Tower has been destroyed.";
            }
            
            updateScoreboard();
            messageModal.classList.remove('hidden');
            
            cancelAnimationFrame(animationFrameId);
            clearInterval(aiIntervalId);
            animationFrameId = null;
            aiIntervalId = null;
        }

        // Initial setup
        document.addEventListener('DOMContentLoaded', () => {
            updateScoreboard();
            if (hasDeckSelectionUnlocked) {
                showDeckSelection();
            } else {
                playerDeck = ALL_CARD_STATS.slice(0, 4);
                populateGameCards();
                startGame();
            }
        });
    </script>
</body>
</html>
